name: Multi-Platform Release Build (Unlock)

on:
  push:
    branches: [ master, feat-automation-scripts ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }} (Static)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Build Tools & Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config gettext autopoint libcppunit-dev
        if [[ "${{ matrix.arch }}" == "arm64" ]]; then
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        fi

    - name: Configure and Build
      run: |
        autoreconf -i
        if [[ "${{ matrix.arch }}" == "x64" ]]; then
          ./configure --enable-static --disable-nls --without-libxml2 --without-gnutls --without-libssh2 --without-sqlite3
        else
          ./configure --host=aarch64-linux-gnu --enable-static --disable-nls --without-libxml2 --without-gnutls --without-libssh2 --without-sqlite3
        fi
        make -j$(nproc)
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-linux-${{ matrix.arch }}-unlock
        path: src/aria2c

  build-windows:
    name: Build Windows x64 (MinGW)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Windows setup
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 autoconf automake libtool pkg-config gettext autopoint
    - name: Build aria2c
      run: |
        autoreconf -i
        ./configure --host=x86_64-w64-mingw32 --without-libxml2 --without-gnutls --without-libnettle --without-libgmp --without-libssh2 --without-sqlite3 --disable-nls
        make -j$(nproc)
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-windows-x64-unlock
        path: src/aria2c.exe

  build-macos:
    name: Build macOS with LLVM 21
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install LLVM 21
      run: |
        brew install llvm@21
        echo "CC=$(brew --prefix llvm@21)/bin/clang" >> $GITHUB_ENV
        echo "CXX=$(brew --prefix llvm@21)/bin/clang++" >> $GITHUB_ENV
    - name: Build aria2c
      run: |
        brew install autoconf automake libtool pkg-config gettext libxml2 sqlite3 c-ares libssh2
        autoreconf -i
        ./configure --without-openssl --without-gnutls --with-appletls --with-libxml2 --disable-nls
        make -j$(sysctl -n hw.ncpu)
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-macos-unlock
        path: src/aria2c
