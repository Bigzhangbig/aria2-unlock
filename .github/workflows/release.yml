name: Multi-Platform LLVM 21 Build (Unlock)

on:
  push:
    branches: [ master, feat-automation-scripts ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux ${{ matrix.arch }} with LLVM 21
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup LLVM 21
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-21 lld-21 libc++-21-dev libc++abi-21-dev
        echo "CC=clang-21" >> $GITHUB_ENV
        echo "CXX=clang++-21" >> $GITHUB_ENV
        echo "LDFLAGS=-fuse-ld=lld-21" >> $GITHUB_ENV

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config gettext \
          libxml2-dev libcppunit-dev zlib1g-dev libsqlite3-dev libc-ares-dev libssh2-1-dev
        if [[ "${{ matrix.arch }}" == "arm64" ]]; then
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        fi

    - name: Configure and Build
      run: |
        autoreconf -i
        if [[ "${{ matrix.arch }}" == "x64" ]]; then
          ./configure --enable-static --disable-nls
        else
          ./configure --host=aarch64-linux-gnu --enable-static --disable-nls
        fi
        make -j$(nproc)
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-linux-${{ matrix.arch }}-llvm21
        path: src/aria2c

  build-windows:
    name: Build Windows x64 with LLVM 21
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup LLVM 21
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21
        sudo apt-get install -y clang-21 lld-21
        echo "CC=clang-21" >> $GITHUB_ENV
        echo "CXX=clang++-21" >> $GITHUB_ENV
    - name: Windows setup
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 autoconf automake libtool pkg-config gettext
    - name: Build aria2c
      run: |
        autoreconf -i
        ./configure --host=x86_64-w64-mingw32 --without-libxml2 --without-gnutls --without-libnettle --without-libgmp --without-libssh2 --disable-nls
        make -j$(nproc)
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-windows-x64-llvm21
        path: src/aria2c.exe

  build-macos:
    name: Build macOS with LLVM 21
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install LLVM 21
      run: |
        brew install llvm@21
        echo "CC=$(brew --prefix llvm@21)/bin/clang" >> $GITHUB_ENV
        echo "CXX=$(brew --prefix llvm@21)/bin/clang++" >> $GITHUB_ENV
    - name: Build aria2c
      run: |
        brew install autoconf automake libtool pkg-config gettext libxml2 sqlite3 c-ares libssh2
        autoreconf -i
        # Build for current arch only first to ensure success
        ./configure --without-openssl --without-gnutls --with-appletls --with-libxml2 --disable-nls
        make -j$(sysctl -n hw.ncpu)
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-macos-${{ runner.arch }}-llvm21
        path: src/aria2c
