name: Multi-Platform Build (Unlock Edition)

on:
  push:
    branches: [ master, feat-automation-scripts ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: brew install autoconf automake libtool pkg-config gettext cppunit libxml2
    - name: Configure and Build
      run: |
        autoreconf -i
        ./configure --with-appletls --with-libxml2 --disable-nls
        make -j$(sysctl -n hw.ncpu)
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-macos-unlock
        path: src/aria2c

  build-linux-static:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config libxml2-dev libcppunit-dev gettext
    - name: Configure and Build (Static)
      run: |
        autoreconf -i
        ./configure --enable-static --disable-nls
        make -j$(nproc)
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-linux-static-unlock
        path: src/aria2c
